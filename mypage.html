<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal CSS Background Example</title>
    <style>
        /* This targets the entire web page */
        body {
            background-color: grey; 
        }
        /* This targets only specific text boxes */
        .highlight-box {
            background-color: purple;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Web Page</h1>
    
    <div class="highlight-box">
        <p>Hope you are having a good day!.</p>
    </div>

</body>
</html>
